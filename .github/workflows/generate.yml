name: Regenerate Dashboard

on:
  push:
    paths:
      - 'data/CIM_Master_Data.xlsx'   # triggers whenever the xlsx is updated
  workflow_dispatch:                   # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install openpyxl

      - name: Generate dashboard
        run: python scripts/generate_dashboard.py

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-regenerate dashboard from updated xlsx [skip ci]"
          git push
